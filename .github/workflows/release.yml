name: release
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the tagger can read past tags/commits

      # Compute the next semver from Conventional Commits and create the tag.
      - name: Tag from commit messages
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false   # no conventional commits since last tag -> no release

      # Publish a GitHub Release with the generated changelog (skipped when no bump).
      - name: Publish release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

      # Bump plugin.json to the released version and prepend the same notes into
      # CHANGELOG.md, in one commit. Pushes via GITHUB_TOKEN, which does not
      # re-trigger workflows, so no loop. The plugin version is the install
      # cache key, so bumping it is what lets `claude plugin update` pick up
      # changes on already-installed machines.
      - name: Bump plugin.json and update CHANGELOG.md
        if: steps.tag.outputs.new_tag != ''
        env:
          CHANGELOG: ${{ steps.tag.outputs.changelog }}
          NEW_VERSION: ${{ steps.tag.outputs.new_version }}
        run: |
          jq --arg v "$NEW_VERSION" '.version = $v' .claude-plugin/plugin.json > plugin.json.tmp
          mv plugin.json.tmp .claude-plugin/plugin.json
          python3 - <<'PY'
          import os, pathlib
          p = pathlib.Path("CHANGELOG.md")
          text = p.read_text()
          block = os.environ["CHANGELOG"].strip()
          marker = "## [Unreleased]"
          assert marker in text, "missing Unreleased marker in CHANGELOG.md"
          p.write_text(text.replace(marker, f"{marker}\n\n{block}", 1))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md .claude-plugin/plugin.json
          git diff --cached --quiet && { echo "already current"; exit 0; }
          git commit -m "chore: release ${{ steps.tag.outputs.new_tag }} [skip ci]"
          git push origin HEAD:main
