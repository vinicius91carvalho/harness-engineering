name: release
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the tagger can read past tags/commits

      # Compute the next semver from Conventional Commits and create the tag.
      - name: Tag from commit messages
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false   # no conventional commits since last tag -> no release

      # Publish a GitHub Release with the generated changelog (skipped when no bump).
      - name: Publish release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

      # Prepend the same notes into CHANGELOG.md and commit. Pushes via
      # GITHUB_TOKEN, which does not re-trigger workflows, so no loop.
      - name: Update CHANGELOG.md
        if: steps.tag.outputs.new_tag != ''
        env:
          CHANGELOG: ${{ steps.tag.outputs.changelog }}
        run: |
          python3 - <<'PY'
          import os, pathlib
          p = pathlib.Path("CHANGELOG.md")
          text = p.read_text()
          block = os.environ["CHANGELOG"].strip()
          marker = "## [Unreleased]"
          assert marker in text, "missing Unreleased marker in CHANGELOG.md"
          p.write_text(text.replace(marker, f"{marker}\n\n{block}", 1))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for ${{ steps.tag.outputs.new_tag }} [skip ci]"
          git push origin HEAD:main
