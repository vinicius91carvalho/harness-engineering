name: release
# Release only runs after the `ci` workflow completes successfully on main,
# so a broken build never ships a tag. Pushes the bump commit via
# GITHUB_TOKEN ([skip ci]), which doesn't re-trigger ci, so no loop.
#
# Order matters: assemble matching manifests + changelog, commit that tree,
# then tag and publish the same commit. Tagging before the bump left every
# release tag with the previous plugin version (install cache key).
on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          dry_run: true

      - name: Assemble release tree
        if: steps.tag.outputs.new_tag != ''
        id: assemble
        env:
          CHANGELOG: ${{ steps.tag.outputs.changelog }}
          NEW_VERSION: ${{ steps.tag.outputs.new_version }}
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          for f in .claude-plugin/plugin.json .codex-plugin/plugin.json .cursor-plugin/plugin.json; do
            jq --arg v "$NEW_VERSION" '.version = $v' "$f" > "$f.tmp"
            mv "$f.tmp" "$f"
          done
          python3 - <<'PY'
          import os, pathlib
          p = pathlib.Path("CHANGELOG.md")
          text = p.read_text()
          block = os.environ["CHANGELOG"].strip()
          marker = "## [Unreleased]"
          assert marker in text, "missing Unreleased marker in CHANGELOG.md"
          p.write_text(text.replace(marker, f"{marker}\n\n{block}", 1))
          PY
          for f in .claude-plugin/plugin.json .codex-plugin/plugin.json .cursor-plugin/plugin.json; do
            got=$(jq -r .version "$f")
            test "$got" = "$NEW_VERSION" || { echo "manifest $f version $got != $NEW_VERSION"; exit 1; }
          done
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md .claude-plugin/plugin.json .codex-plugin/plugin.json .cursor-plugin/plugin.json
          if git diff --cached --quiet; then
            echo "already current"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: release ${NEW_TAG} [skip ci]"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Tag assembled commit
        if: steps.tag.outputs.new_tag != ''
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
          SHA: ${{ steps.assemble.outputs.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout "$SHA"
          for f in .claude-plugin/plugin.json .codex-plugin/plugin.json .cursor-plugin/plugin.json; do
            got=$(jq -r .version "$f")
            want=${NEW_TAG#v}
            test "$got" = "$want" || { echo "refusing to tag: $f has $got, want $want"; exit 1; }
          done
          git tag -a "$NEW_TAG" -m "$NEW_TAG" "$SHA"
          git push origin "refs/tags/$NEW_TAG"

      - name: Publish release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          target_commitish: ${{ steps.assemble.outputs.sha }}
