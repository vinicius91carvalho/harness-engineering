name: ci
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JSON valid
        run: |
          jq empty .claude-plugin/*.json .codex-plugin/*.json .cursor-plugin/*.json .agents/plugins/marketplace.json config/*.json opencode.json omnigent/harness-engineering/roles.example.json

      - name: Catalog and asset contracts
        run: |
          ! jq -e '.plugins[] | select(.name == "codebase-memory-mcp")' .claude-plugin/marketplace.json
          ! jq -e '.plugins[] | select(.name == "remember")' .agents/plugins/marketplace.json
          test "$(jq -r .version .claude-plugin/plugin.json)" = "$(jq -r .version .codex-plugin/plugin.json)"
          test "$(jq -r .version .claude-plugin/plugin.json)" = "$(jq -r .version .cursor-plugin/plugin.json)"
          for p in $(jq -r '.interface.logo, .interface.screenshots[]' .codex-plugin/plugin.json); do test -f "${p#./}"; done

      - name: Shell syntax
        run: |
          sh -n install.sh
          bash -n scripts/statusline.sh scripts/sync-config.sh omnigent/harness-engineering/scripts/bootstrap-setup.sh omnigent/harness-engineering/scripts/plan-feature.sh omnigent/harness-engineering/scripts/portable-timeout.sh

      - name: Selftests
        run: |
          bash tests/install_test.sh
          bash tests/orchestrator_test.sh
          bash tests/supervisor_test.sh
          bash tests/site_test.sh
          bash tests/omnigent_test.sh
          bash tests/bootstrap_setup_test.sh
          bash tests/plan_feature_test.sh
          bash tests/reconcile_test.sh
          bash tests/setup_inventory_test.sh
          bash tests/claim_test.sh
          bash tests/lib_test.sh
          bash tests/manifest_test.sh
          bash scripts/statusline.sh --selftest
          bash scripts/sync-config.sh --selftest

      - name: Skill frontmatter
        run: |
          f=skills/update-project/SKILL.md
          test -f "$f"
          grep -q '^name:' "$f"
          grep -q '^description:' "$f"
          grep -q '^name:' skills/supervisor/SKILL.md
          grep -q '^description:' skills/supervisor/SKILL.md

  portable-shell:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/install_test.sh
      - run: bash tests/orchestrator_test.sh
      - run: bash tests/supervisor_test.sh
      - run: bash tests/site_test.sh
      - run: bash tests/omnigent_test.sh
      - run: bash tests/bootstrap_setup_test.sh
      - run: bash tests/plan_feature_test.sh
      - run: bash tests/reconcile_test.sh
      - run: bash tests/setup_inventory_test.sh
      - run: bash tests/claim_test.sh
      - run: bash tests/manifest_test.sh

  powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell installer
        shell: pwsh
        run: |
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path install.ps1), [ref]$null, [ref]$errors)
          if ($errors.Count) { $errors | Out-String | Write-Error }
