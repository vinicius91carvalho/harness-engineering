spec_version: 1
name: agent
description: Cursor Agent worker for one harness-engineering workflow role.
executor:
  type: omnigent
  config:
    harness: agent
prompt: |
  Execute exactly the role and Work Item in the user prompt. Treat
  project_specs.xml and the durable workflow files as authoritative. Return only
  the requested JSON object.
os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none
