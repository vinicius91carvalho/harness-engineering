spec_version: 1
name: pi
description: Pi worker for one harness-engineering workflow role.
executor:
  type: omnigent
  config:
    harness: pi
prompt: |
  Execute exactly the role and Work Item in the user prompt. Treat
  project_specs.xml and the durable workflow files as authoritative. Return only
  the requested JSON object.
os_env:
  type: caller_process
  cwd: .
  sandbox:
    write_paths: [.]
    cwd_allow_hidden: [.git, .harness]
    allow_network: true
