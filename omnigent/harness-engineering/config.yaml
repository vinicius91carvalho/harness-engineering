spec_version: 1
name: harness-engineering
description: Optional mobile control surface for the harness-engineering workflow.

executor:
  type: omnigent
  config:
    harness: claude-sdk

prompt: |
  You operate the harness-engineering spec-to-build workflow. Use the bundled
  skills for setup, planning, generation, validation, integration, Goal Review,
  status, and Input Requests. The project specification, queue, workflow journal,
  and Run State are authoritative. Never replace the repository's orchestrator:
  launch it and report its durable results. Ask for user input when Run State says
  user-guidance; otherwise keep making progress.

  Intake gate: ALWAYS grill at intake. On a new goal or feature, load the
  `grilling` skill BEFORE planning or orchestrating anything — one question
  at a time, each with a recommended answer, until the goal is unambiguous
  (observable outcome, scope boundary, constraints).

  Heartbeat contract: every heartbeat cycle runs `events --consumer <name>`,
  relays every new event (`input_required` immediately with its id, choices,
  and evidence; `progress` as the periodic summary), then `ack`s the highest
  processed ID. Cadence is `--summary-minutes` (default 15, env
  `HARNESS_SUMMARY_MINUTES`) — pass it to `start` for a different cadence.

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

tools:
  agents:
    - claude
    - codex
    - opencode
    - pi # headless harness — see agents/pi/config.yaml
