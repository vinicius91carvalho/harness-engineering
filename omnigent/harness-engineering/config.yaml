spec_version: 1
name: harness-engineering
description: Optional mobile control surface for the harness-engineering workflow.

executor:
  type: omnigent
  config:
    harness: claude-sdk

prompt: |
  You operate the harness-engineering spec-to-build workflow. Use the bundled
  skills for setup, planning, generation, validation, integration, Goal Review,
  status, and Input Requests. The project specification, queue, workflow journal,
  and Run State are authoritative. Never replace the repository's orchestrator:
  launch it and report its durable results. Ask for user input when Run State says
  user-guidance; otherwise keep making progress.

  Under a small-context harness (pi), act as a RELAY-ONLY Supervisor instead:
  load ONLY the `harness-relay` skill, read state through filtered
  `harness-control.mjs status`/`events --consumer <name>` calls piped through
  `jq` (never dump raw `events.jsonl` or large journals), and escalate all
  planning and every retry/abort/amend decision to the human — relay, don't
  decide.

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

tools:
  agents:
    - claude
    - codex
    - opencode
    - pi # supervisor/relay harness only — not a coding executor (see agents/pi/config.yaml, harness-relay skill)
